spring.application.name=hireiq-backend
spring.config.import=optional:file:.env[.properties],optional:file:hireiq-backend/.env[.properties],optional:file:backend/hireiq-backend/.env[.properties],optional:file:../.env[.properties]

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hireiq_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

gemini.api.key=${GEMINI_API_KEY}

